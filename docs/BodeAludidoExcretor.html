<!DOCTYPE html>
<html lang="blouco">

<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="">
  <meta name="author" content="">

  <meta property="og:title" content="Blouco">
  <meta property="og:description" content="BodeAludidoExcretor">
  <meta property="og:image" content="https://blouco.neocities.org/EnsaioDoBlouco.png">
  <meta property="og:url" content="https://blouco.neocities.org">
  <meta name="twitter:card" content="summary_large_image">
  <meta property="og:site_name" content="Blouco">
  <meta name="twitter:image:alt" content="">
  <meta name="twitter:site" content="@_blouco">

  <title>Segue o Blouco!</title>

  <!-- Bootstrap core CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
    integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

  <style type="text/css">
    body {
      background-color: #dd29dd;
    }
  </style>

</head>

<body>

  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark static-top">
    <div class="container">
      <a class="navbar-brand" href="#">Blouco</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive"
        aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row topo">
      <!-- Banner principal-->
      <div class="col-md-offset-6 col-md-12 text-center">
        <img style="width: 300px;" src="EnsaioDoBlouco.png" />
      </div>
    </div>
    <div class="row blouco">
      <div class="banda col-xs-12 embed-responsive embed-responsive-16by9">

        <!-- Transmissão -->
        <!-- Add a placeholder for the Twitch embed -->
        <div id="twitch-embed"></div>

        <!-- Load the Twitch embed script -->
        <script src="https://player.twitch.tv/js/embed/v1.js"></script>

        <!-- Create a Twitch.Player object. This will render within the placeholder div -->
        <script type="text/javascript">
          new Twitch.Player("twitch-embed", {
            channel: "volooptaz"
          });
        </script>
      </div>
      
      <!-- Chat -->
      <div class="papo col-xs-7 col-md-12 embed-responsive embed-responsive-1by1">
        <iframe class="embed-responsive-item"src="https://kiwiirc.com/nextclient/chat.freenode.org/#IndignoPenaAteado"
          style="border:5; width:100%; height:100%;"></iframe>
      </div>
    </div>
  </div>

  <!-- Bootstrap core JavaScript -->
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
    integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
    crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"
    integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
    crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"
    integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
    crossorigin="anonymous"></script>

</body>

</html>
